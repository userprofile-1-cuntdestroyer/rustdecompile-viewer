*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif}
code,pre,.mono{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace}
header{padding:14px 20px;border-bottom:1px solid var(--line);background:var(--inset);
  display:flex;align-items:baseline;gap:14px;position:sticky;top:0;z-index:5}
header h1{font-size:16px;margin:0;font-weight:650}
header .sub{color:var(--mut);font-size:12px}
.wrap{display:flex;min-height:calc(100vh - 51px)}
aside{width:300px;flex:0 0 300px;border-right:1px solid var(--line);background:var(--panel);overflow:auto}
main{flex:1;padding:20px 26px;overflow:auto;max-width:1100px}
.card{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.card:hover{background:var(--panel2)}
.card.sel{background:var(--panel2);border-left:3px solid var(--acc);padding-left:11px}
.card .builds{font-weight:600;font-size:13px}
.card .builds .arrow{color:var(--mut);font-weight:400}
.card .date{color:var(--mut);font-size:11px;margin:2px 0 7px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.b{font-size:11px;padding:0 7px;line-height:18px;border-radius:2em;font-weight:500;border:1px solid transparent}
.b.add{background:var(--label-add-bg);color:var(--label-add-fg)}
.b.rem{background:var(--label-rem-bg);color:var(--label-rem-fg)}
.b.mod{background:var(--label-mod-bg);color:var(--label-mod-fg)}
.b.flat{background:var(--label-flat-bg);color:var(--label-flat-fg);border-color:var(--line)}
.tag{display:inline-block;margin-top:7px;font-size:10px;color:var(--mut);border:1px solid var(--line);
  border-radius:4px;padding:0 5px}
h2{font-size:15px;margin:26px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
h2:first-of-type{margin-top:4px}
.pairhead{font-size:20px;font-weight:650}
.pairhead .arrow{color:var(--mut)}
.note{color:var(--mut);font-size:12px;margin:6px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.grp{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
.grp h3{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
.stat{display:flex;justify-content:space-between;padding:2px 0}
.stat .v{font-weight:650;font-variant-numeric:tabular-nums}
.stat.zero{color:var(--cmt)}.stat.zero .v{font-weight:400}
.stat .v.add{color:var(--add)}.stat .v.rem{color:var(--del)}.stat .v.mod{color:var(--mov)}
.churn{color:var(--cmt);font-size:11px;margin-top:7px;border-top:1px dashed var(--line);padding-top:6px}
ul.types{list-style:none;padding:0;margin:0;columns:2;column-gap:26px}
ul.types li{padding:2px 0;break-inside:avoid}
ul.types .n{color:var(--mut);font-variant-numeric:tabular-nums}
details{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:8px 0;overflow:hidden}
details>summary{cursor:pointer;padding:9px 13px;font-weight:600;list-style:none;display:flex;
  align-items:center;gap:0}
details>summary::-webkit-details-marker{display:none}
details>summary .sz{color:var(--mut);font-size:11px;font-weight:400;margin-left:auto}
.gtag{font-size:10px;color:var(--label-add-fg);background:var(--label-add-bg);border:1px solid transparent;
  border-radius:2em;padding:0 7px;margin-left:8px;font-weight:500}
.filter{width:100%;padding:8px 11px;margin:2px 0 12px;background:var(--panel);border:1px solid var(--line);
  border-radius:7px;color:var(--fg);font-size:13px;font-family:inherit}
.filter:focus{outline:none;border-color:var(--acc)}
.filter::placeholder{color:var(--cmt)}
/* global cross-build search (header) */
.gsearch{flex:0 0 280px;margin-left:auto;padding:6px 11px;background:var(--bg);border:1px solid var(--line);
  border-radius:7px;color:var(--fg);font-size:13px;font-family:inherit}
.gsearch:focus{outline:none;border-color:var(--acc)}
.gsearch::placeholder{color:var(--cmt)}
header .legend{margin-left:0}
.sresult{padding:6px 10px;border:1px solid var(--line);border-radius:7px;margin:6px 0;cursor:pointer;
  display:flex;align-items:center;gap:8px;background:var(--panel)}
.sresult:hover{background:var(--panel2);border-color:var(--acc)}
.sresult .n{color:var(--mut);font-variant-numeric:tabular-nums;margin-left:auto}
.sresgrp{margin:14px 0}
.sresgrp h3{font-size:13px;margin:0 0 4px}
.sresgrp h3 .arrow{color:var(--mut);font-weight:400}
/* serialized_layout.json links (ASF oracle, on-disk) */
.llinks{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0}
.llink{display:inline-block;padding:6px 11px;border:1px solid var(--line);border-radius:7px;
  background:var(--panel);color:var(--acc);text-decoration:none;font-size:12.5px;font-family:ui-monospace,monospace}
.llink:hover{border-color:var(--acc);background:var(--panel2)}
details[open]>summary{border-bottom:1px solid var(--line)}
pre.diff{margin:0;padding:0;overflow:auto;max-height:560px;background:var(--bg);
  font:12px/20px ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace}
.diffbody{display:block;min-width:100%;width:max-content}  /* full-width row bg + horizontal scroll on long lines */
.row{display:flex}
.row .ln{flex:0 0 52px;text-align:right;padding:0 10px;color:var(--ln);user-select:none;
  -webkit-user-select:none;background:var(--ln-bg);border-right:1px solid var(--line)}
.row .lc{flex:1 0 auto;padding:0 14px;white-space:pre}
.row:hover .ln{color:var(--fg)}
.row.add{background:var(--add-bg)} .row.add .ln{background:var(--add-gut);color:var(--add-fg)} .row.add .lc{color:var(--add-fg)}
.row.del{background:var(--del-bg)} .row.del .ln{background:var(--del-gut);color:var(--del-fg)} .row.del .lc{color:var(--del-fg)}
.row.mov{background:var(--mov-bg)} .row.mov .ln{background:var(--mov-gut)} .row.mov .lc{color:var(--mov)}
.row.hdr{background:var(--hdr-bg)} .row.hdr .lc{color:var(--hdr);font-weight:600}
.row.cmt .lc{color:var(--cmt)}
.legend{color:var(--mut);font-size:11px;margin-left:auto;display:flex;gap:12px}
.legend b{font-weight:600}
.empty{color:var(--mut);padding:40px;text-align:center}
.noise{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px;
  color:var(--mut);font-size:12px}
.noise b{color:var(--fg)}
.rep{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:0}
.rep pre{margin:0;padding:13px;white-space:pre-wrap;font-size:12.5px;color:var(--fg)}
/* Russian digest panel -- the chat-forward artifact, accented so it reads as the headline takeaway */
.rupanel{background:var(--panel);border:1px solid var(--acc);border-radius:8px;margin:14px 0;overflow:hidden}
.ruhead{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:8px 13px;
  background:var(--panel2);border-bottom:1px solid var(--line);font-size:13px}
.rucopy{cursor:pointer;border:1px solid var(--acc);border-radius:6px;padding:4px 12px;font-size:12px;
  white-space:nowrap;background:var(--panel);color:var(--acc);font-family:inherit}
.rucopy:hover{background:var(--acc);color:#fff}
.rumd{margin:0;padding:13px;white-space:pre-wrap;word-break:break-word;font-size:12.5px;color:var(--fg);
  font-weight:500;max-height:340px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
/* asset side (Rust Studio): file-list with +/- markers + per-asset value diff */
h3.asub{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin:16px 0 6px}
.afiles{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:4px 0 8px;background:var(--panel)}
.afile{display:flex;align-items:center;gap:10px;padding:5px 12px;border-bottom:1px solid var(--line);font-size:12.5px}
.afile:last-child{border-bottom:none}
.afile:hover{background:var(--panel2)}
.afile .mk{flex:0 0 18px;height:18px;line-height:17px;text-align:center;border-radius:4px;font-weight:700;font-size:13px}
.afile .mk.add{background:var(--add-gut);color:var(--add-fg)} .afile.add{background:var(--add-bg)}
.afile .mk.del{background:var(--del-gut);color:var(--del-fg)} .afile.del{background:var(--del-bg)}
.afile .ap{flex:1 1 auto;word-break:break-all}
.aty{color:var(--mut);font-size:11px;border:1px solid var(--line);border-radius:4px;padding:0 6px;white-space:nowrap}
details>summary .aty{margin-left:8px}

const ADD=["types_added","fields_added","methods_added","enum_members_added","interfaces_added","attrs_added"];
const REM=["types_removed","fields_removed","methods_removed","enum_members_removed","interfaces_removed","attrs_removed"];
const MOD=["fields_moved","fields_retyped","bodies_changed","enum_members_changed","attrs_argchanged"];
const g=(c,ks)=>ks.reduce((s,k)=>s+(c[k]||0),0);
const esc=s=>s.replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
const isGame=a=>/^(Assembly-CSharp|Rust|Facepunch)/.test(a);   // real-signal assemblies vs library churn

function colorize(text){
  const rows = text.replace(/\n$/,"").split("\n").map((l,i)=>{   // drop trailing newline -> no phantom row
    let c="ctx";
    if(l.startsWith("+")) c="add";
    else if(l.startsWith("-")&&!l.startsWith("--")) c="del";
    else if(l.startsWith("~")) c="mov";
    else if(l.trimStart().startsWith("//")) c="cmt";
    else if(l.startsWith("class ")||l.startsWith("// ===")) c="hdr";
    return '<span class="row '+c+'"><span class="ln">'+(i+1)+'</span><span class="lc">'+(esc(l)||" ")+'</span></span>';
  }).join("");
  return '<span class="diffbody">'+rows+'</span>';
}

function badges(c){
  const a=g(c,ADD),r=g(c,REM),m=g(c,MOD),out=[];
  out.push(a?'<span class="b add">+'+a+'</span>':'');
  out.push(r?'<span class="b rem">−'+r+'</span>':'');
  out.push(m?'<span class="b mod">~'+m+'</span>':'');
  if(!a&&!r&&!m) out.push('<span class="b flat">no change</span>');
  return out.join("");
}

function renderSide(){
  document.getElementById("sub").textContent =
    PAIRS.length+" build "+(PAIRS.length===1?"pair":"pairs")+" · local, self-contained";
  const s=document.getElementById("side");
  s.innerHTML = PAIRS.map((p,i)=>{
    const m=p.meta, A=p.assets;
    const aBadge = A ? '<div class="badges" style="margin-top:5px"><span class="b flat">assets</span>'
      +(A.added.length?'<span class="b add">+'+A.added.length+'</span>':'')
      +(A.removed.length?'<span class="b rem">−'+A.removed.length+'</span>':'')
      +(A.changed.length?'<span class="b mod">~'+A.changed.length+'</span>':'')
      +(!A.added.length&&!A.removed.length&&!A.changed.length?'<span class="b flat">·</span>':'')+'</div>' : '';
    return '<div class="card" data-i="'+i+'">'
      +'<div class="builds">'+esc(m.prior)+' <span class="arrow">→</span> '+esc(m.new)+'</div>'
      +'<div class="date">'+esc(p.generated)+'</div>'
      +'<div class="badges">'+badges(p.counts)+'</div>'
      +'<div class="badges" style="margin-top:5px"><span class="b flat">'+m.changed_type_count+' changed types</span></div>'
      +aBadge
      +(p.synthetic?'<div class="tag">synthetic demo</div>':'')+'</div>';
  }).join("");
  [...s.querySelectorAll(".card")].forEach(el=>el.onclick=()=>select(+el.dataset.i));
}

function statRow(c,key,label,kind){
  const v=c[key]||0, z=v?"":" zero";
  return '<div class="stat'+z+'"><span>'+label+'</span><span class="v '+(v?kind:"")+'">'+v+'</span></div>';
}

function renderDetail(p){
  const m=p.meta,c=p.counts,P=[];
  P.push('<div class="pairhead">'+esc(m.prior)+' <span class="arrow">→</span> '+esc(m.new)+'</div>');
  P.push('<div class="note">Generated '+esc(p.generated)
    +(p.synthetic?' · <b>synthetic demo build</b> (mutated from baseline, for pipeline proof)':'')
    +(m.overlay_ok?' · method-body overlay on':' · body overlay skipped (no fingerprints)')+'</div>');

  // compact Russian digest -- the artifact you forward to the team chat (copy button + raw markdown)
  if(p.summary_ru){
    P.push('<div class="rupanel"><div class="ruhead">'
      +'<b>Summary (RU)</b>'
      +'<button class="rucopy" type="button" onclick="copyRu(this)">Скопировать</button></div>'
      +'<pre class="rumd">'+esc(p.summary_ru)+'</pre></div>');
  }

  P.push("<h2>Change summary</h2><div class='grid'>");
  for(const [name,rows,churn] of GROUPS){
    let h='<div class="grp"><h3>'+name+'</h3>';
    h+=rows.map(([k,lbl,kind])=>statRow(c,k,lbl,kind)).join("");
    if(churn&&(c[churn]||0)) h+='<div class="churn">+'+c[churn]+' library/engine churn (stripping noise, aggregated)</div>';
    P.push(h+"</div>");
  }
  P.push("</div>");

  P.push('<h2>Known-noise (excluded from itemized diff)</h2><div class="noise">'
    +'Obfuscated names re-hash every build → no stable cross-build identity: <b>'+m.obf_fields
    +'</b> obf fields, <b>'+m.obf_methods+'</b> obf methods in the new build are not itemized. '
    +'Compiler-generated / <code>-fake-N</code> / Burst shims and library managed-stripping churn are aggregated, not listed.</div>');

  if(m.top_types&&m.top_types.length){
    P.push("<h2>Most-changed types</h2><ul class='types'>");
    P.push(m.top_types.map(([t,n])=>'<li><span class="mono">'+esc(t)+'</span> <span class="n">— '+n+'</span></li>').join(""));
    P.push("</ul>");
  }

  const asms=Object.keys(p.diffs).sort((a,b)=>(isGame(b)-isGame(a))||a.localeCompare(b)); // game first
  const ngame=asms.filter(isGame).length;
  const hasAssets = p.assets && (p.assets.added.length||p.assets.removed.length||p.assets.changed.length);
  if(asms.length||hasAssets)   // single filter box drives both the schema diffs and the asset blocks below
    P.push('<input id="afilter" class="filter" placeholder="filter by name or text (assembly · asset · type)…">');
  P.push("<h2>Per-assembly schema diff ("+asms.length+(ngame?" · "+ngame+" game":"")+")</h2>");
  if(!asms.length) P.push('<div class="note">No itemized per-assembly blocks (only aggregated churn).</div>');
  for(const a of asms){
    const txt=p.diffs[a], lines=txt.split("\n").length;
    P.push('<details data-name="'+esc(a).toLowerCase()+'"><summary><span class="mono">'+esc(a)+'</span>'
      +(isGame(a)?'<span class="gtag">game</span>':'')
      +'<span class="sz">'+lines+' lines</span></summary>'
      +'<pre class="diff">'+colorize(txt)+'</pre></details>');
  }

  P.push(assetPanel(p));   // asset/serialized-value side (Rust Studio), when present

  if(p.layout && (p.layout.prior || p.layout.new)){
    P.push("<h2>Serialized layout (ASF oracle)</h2>");
    P.push('<div class="note">Per-type Unity serialization order (field <span class="mono">name · type · offset · serialized</span>) — '
      +'the Rust Studio correctness oracle (type-gating, obf-nested resolve, positional check). '
      +'Large on-disk JSON; opens in a new tab.</div>');
    const ll=(b,lbl)=>'<a class="llink" href="../'+encodeURIComponent(b)+'/symbols/serialized_layout.json" '
      +'target="_blank" rel="noopener">'+lbl+' · '+esc(b)+' →</a>';
    P.push('<div class="llinks">'+(p.layout.prior?ll(m.prior,"prior"):"")+(p.layout.new?ll(m.new,"new"):"")+'</div>');
  }

  if(p.report){
    P.push("<h2>Plain-language report (REPORT.md)</h2>");
    P.push('<details class="rep"><summary>Show REPORT.md</summary><pre>'+esc(p.report)+'</pre></details>');
  }
  return P.join("");
}

// asset side: parsed REPORT-assets -> file list (+/- markers) + per-asset value diff (~ old -> new rows)
function assetPanel(p){
  const A=p.assets;
  if(!A) return "";
  const P=[];
  P.push('<h2>Assets &amp; values <span style="color:var(--mut);font-weight:400;font-size:12px">(Rust Studio)</span></h2>');
  const cov=A.coverage||{};
  if(cov.requested||cov.present||cov.compared)
    P.push('<div class="note">Coverage: '+(cov.requested??"?")+' types requested · '+(cov.present??"?")
      +' present in bundles · '+(cov.compared??"?")+' objects compared.</div>');
  const na=A.added.length,nr=A.removed.length,nc=A.changed.length;
  P.push('<div class="badges" style="margin:6px 0 4px">'
    +(na?'<span class="b add">+'+na+' added</span>':'')
    +(nr?'<span class="b rem">−'+nr+' removed</span>':'')
    +(nc?'<span class="b mod">~'+nc+' changed</span>':'')
    +(!na&&!nr&&!nc?'<span class="b flat">no asset change</span>':'')+'</div>');
  const fileList=(items,mk,cls)=> !items.length ? "" :
    '<div class="afiles">'+items.map(it=>
      '<div class="afile '+cls+'" data-name="'+esc((it.path+" "+it.type).toLowerCase())+'">'
      +'<span class="mk '+cls+'">'+mk+'</span><span class="ap mono">'+esc(it.path)+'</span>'
      +'<span class="aty">'+esc(it.type)+'</span></div>').join("")+'</div>';
  if(na){ P.push('<h3 class="asub">Added assets</h3>'); P.push(fileList(A.added,"+","add")); }
  if(nr){ P.push('<h3 class="asub">Removed assets</h3>'); P.push(fileList(A.removed,"−","del")); }
  if(nc){
    P.push('<h3 class="asub">Changed values</h3>');
    for(const ch of A.changed){
      const rows=ch.fields.map(f=>'<span class="row mov"><span class="ln"> </span><span class="lc">'
        +esc(f.path+": "+f.old+"  →  "+f.new)+'</span></span>').join("");
      P.push('<details data-name="'+esc((ch.key+" "+ch.type).toLowerCase())+'"><summary>'
        +'<span class="mono">'+esc(ch.key)+'</span><span class="aty">'+esc(ch.type)+'</span>'
        +'<span class="sz">'+ch.fields.length+' field'+(ch.fields.length===1?"":"s")+'</span></summary>'
        +'<pre class="diff"><span class="diffbody">'+rows+'</span></pre></details>');
    }
  }
  return P.join("");
}

// copy the Russian digest to the clipboard; on file:// where clipboard API may be blocked, fall back to
// selecting the text so the user can hit Ctrl+C.
function copyRu(btn){
  const pre=btn.closest(".rupanel").querySelector(".rumd");
  const done=(label)=>{const o=btn.dataset.o||(btn.dataset.o=btn.textContent);
    btn.textContent=label; setTimeout(()=>{btn.textContent=o;},1600);};
  const fallback=()=>{const r=document.createRange(); r.selectNodeContents(pre);
    const s=getSelection(); s.removeAllRanges(); s.addRange(r); done("Выдели и Ctrl+C");};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(pre.textContent).then(()=>done("Скопировано")).catch(fallback);
  } else { fallback(); }
}

function wireFilter(){
  const inp=document.getElementById("afilter");
  if(!inp) return;
  inp.oninput=()=>{
    const q=inp.value.trim().toLowerCase();
    document.querySelectorAll("main details[data-name]").forEach(d=>{
      const hit = !q || d.dataset.name.includes(q) || d.textContent.toLowerCase().includes(q);
      d.style.display = hit ? "" : "none";
      d.open = q.length>=2 && hit;   // auto-expand matches while actively filtering
    });
    document.querySelectorAll("main .afile[data-name]").forEach(el=>{   // added/removed asset rows
      el.style.display = (!q || el.dataset.name.includes(q)) ? "" : "none";
    });
  };
}

// ---- cross-build type search: scan every pair's diff text + most-changed names + asset names ----
function searchAll(q){
  const out=[];
  PAIRS.forEach((p,i)=>{
    const types=(p.meta.top_types||[]).filter(([t])=>t.toLowerCase().includes(q));
    const asms=Object.entries(p.diffs).map(([asm,txt])=>{
      const n=txt.split("\n").filter(l=>l.toLowerCase().includes(q)).length;
      return n?[asm,n]:null;
    }).filter(Boolean).sort((a,b)=>(isGame(b[0])-isGame(a[0]))||b[1]-a[1]);
    const assets=[];
    if(p.assets){
      p.assets.changed.forEach(ch=>{ if((ch.key+" "+ch.type).toLowerCase().includes(q)) assets.push("~ "+ch.key+" ("+ch.type+")"); });
      p.assets.added.forEach(a=>{ if((a.path+" "+a.type).toLowerCase().includes(q)) assets.push("+ "+a.path+" ("+a.type+")"); });
      p.assets.removed.forEach(a=>{ if((a.path+" "+a.type).toLowerCase().includes(q)) assets.push("− "+a.path+" ("+a.type+")"); });
    }
    if(types.length||asms.length||assets.length) out.push({i,types,asms,assets});
  });
  return out;
}

function renderSearch(q){
  const res=searchAll(q);
  const hits=res.reduce((s,r)=>s+r.asms.length+r.assets.length,0);
  const P=['<div class="pairhead">Search <span class="mono">'+esc(q)+'</span></div>'];
  if(!res.length){ P.push('<div class="empty">No matches for “'+esc(q)+'” across '+PAIRS.length+' build pair'+(PAIRS.length===1?"":"s")+'.</div>'); return P.join(""); }
  P.push('<div class="note">'+res.length+' build pair'+(res.length===1?"":"s")+' · '+hits+' assembly/asset hit'+(hits===1?"":"s")+'. Click a row to jump in.</div>');
  for(const r of res){
    const m=PAIRS[r.i].meta;
    P.push('<div class="sresgrp"><h3>'+esc(m.prior)+' <span class="arrow">→</span> '+esc(m.new)
      +(PAIRS[r.i].synthetic?' <span class="tag">synthetic</span>':'')+'</h3>');
    if(r.types.length) P.push('<div class="note">most-changed: '+r.types.map(([t,n])=>'<span class="mono">'+esc(t)+'</span> ('+n+')').join(", ")+'</div>');
    r.asms.forEach(([asm,n])=>P.push('<div class="sresult" data-i="'+r.i+'"><span class="mono">'+esc(asm)+'</span>'
      +(isGame(asm)?'<span class="gtag">game</span>':'')+'<span class="n">'+n+' line'+(n===1?"":"s")+'</span></div>'));
    r.assets.forEach(a=>P.push('<div class="sresult" data-i="'+r.i+'"><span class="aty">asset</span>'
      +'<span class="mono">'+esc(a)+'</span></div>'));
    P.push('</div>');
  }
  return P.join("");
}

function jumpTo(i){
  const sb=document.getElementById("gsearch"), q=sb.value.trim().toLowerCase();
  sb.value="";                       // leave search mode -> back to normal pair browsing
  select(i);                         // rebuilds main with the pair detail + wires the in-pair filter
  const inp=document.getElementById("afilter");
  if(inp && q){ inp.value=q; inp.oninput(); }   // carry the query into the in-pair filter (auto-expands matches)
  const open=document.querySelector("main details[open]");
  if(open) open.scrollIntoView({block:"start"});
}

function wireSearch(){
  const sb=document.getElementById("gsearch");
  sb.oninput=()=>{
    const q=sb.value.trim().toLowerCase(), main=document.getElementById("main");
    if(q.length>=2){
      main.innerHTML=renderSearch(q); main.scrollTop=0;
      [...main.querySelectorAll(".sresult")].forEach(el=>el.onclick=()=>jumpTo(+el.dataset.i));
    } else if(PAIRS.length){ select(CUR); }
  };
}

let CUR=0;
function select(i){
  CUR=i;
  [...document.querySelectorAll(".card")].forEach((el,j)=>el.classList.toggle("sel",j===i));
  document.getElementById("main").innerHTML = renderDetail(PAIRS[i]);
  document.getElementById("main").scrollTop=0;
  wireFilter();
}

renderSide();
wireSearch();
if(PAIRS.length) select(0);
else document.getElementById("main").innerHTML='<div class="empty">No diff artifacts found.<br>Run schema_diff.py to produce a build pair, then re-run build_viewer.py.</div>';
</script>
</body></html>
